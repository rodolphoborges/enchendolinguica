<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termômetro da Encheção de Linguiça</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        zincbg: '#09090b', /* Zinc 950 */
                        zinccard: '#18181b', /* Zinc 900 */
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #09090b;
            color: #e4e4e7; /* Zinc 200 */
        }
        /* Scrollbar Minimalista */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #27272a; /* Zinc 800 */
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #3f3f46; /* Zinc 700 */
        }
        /* Foco invisível padrão para select */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2371717a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="font-sans min-h-screen p-4 md:p-8 antialiased selection:bg-red-500/30 selection:text-red-200">

    <div class="max-w-4xl mx-auto space-y-16 py-12">
        
        <header class="text-center space-y-4">
            <h1 class="text-5xl md:text-6xl font-black tracking-tight text-white flex flex-col items-center">
                <span class="text-zinc-500 text-sm font-bold uppercase tracking-[0.3em] mb-4">The Gossip Audit</span>
                <span>Encheção de <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-rose-400">Linguiça</span></span>
            </h1>
            <p class="text-zinc-500 text-sm font-medium max-w-lg mx-auto leading-relaxed">
                Um monitoramento analítico, minimalista e levemente cínico sobre o esforço da imprensa em nos manter alienados.
            </p>
        </header>

        <section class="bg-zinc-900/30 border border-white/5 p-2 rounded-2xl shadow-2xl max-w-2xl mx-auto">
            <form id="form-materia" class="flex flex-col md:flex-row gap-2">
                <input type="url" id="url-input" required placeholder="Cole o link da futilidade do dia..." 
                    class="flex-1 bg-transparent border-none rounded-xl px-5 py-4 focus:outline-none focus:ring-0 text-zinc-100 placeholder-zinc-700 text-sm font-medium">
                
                <button type="submit" id="btn-submit" 
                    class="bg-white hover:bg-zinc-200 text-black font-bold py-4 px-10 rounded-xl transition-all active:scale-95 shadow-lg shadow-white/5 text-xs uppercase tracking-widest">
                    Eternizar
                </button>
            </form>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-12 border-y border-white/5 py-12">
            <div class="flex flex-col items-center justify-center text-center space-y-2">
                <h3 class="text-zinc-600 uppercase text-[10px] font-black tracking-[0.4em]">Notícias no Acervo</h3>
                <span id="contador-total" class="text-9xl font-black tracking-tighter text-white">0</span>
            </div>

            <div class="flex flex-col items-center justify-center text-center space-y-4">
                <h3 class="text-zinc-600 uppercase text-[10px] font-black tracking-[0.4em]">Silêncio Editorial</h3>
                <div class="space-y-1">
                    <span id="contador-tempo" class="text-5xl font-black tracking-tight text-rose-500">--</span>
                    <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">desde a última pauta vital</p>
                </div>
            </div>
        </section>

        <section class="space-y-8">
            <div class="flex items-center justify-between">
                <h3 class="text-zinc-500 uppercase text-[10px] font-black tracking-[0.5em]">Arquivo de Pautas</h3>
                <span class="h-px bg-white/5 flex-1 mx-6"></span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-12 gap-12">
                <div class="md:col-span-8">
                    <ul id="lista-materias" class="space-y-6 max-h-[600px] overflow-y-auto pr-6 custom-scrollbar">
                        <!-- Itens virão dinamicamente -->
                    </ul>
                </div>
                
                <div class="md:col-span-4 space-y-12">
                    <div class="space-y-6">
                        <h4 class="text-zinc-600 uppercase text-[9px] font-black tracking-widest">Culpados Favoritos</h4>
                        <ul id="ranking-lista" class="space-y-4">
                            <!-- Ranking virá dinamicamente -->
                        </ul>
                    </div>

                    <div class="space-y-6">
                        <h4 class="text-zinc-600 uppercase text-[9px] font-black tracking-widest">Atividade Recente</h4>
                        <div class="h-40 w-full">
                            <canvas id="grafico-ocio"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </div>

    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÕES LOCAL JSON (Ex-Supabase)
        // ==========================================
        let graficoInstancia = null;

        // Frases irônicas aleatórias para gerar automaticamente
        const FRASES_IRONICAS = [
            "O amor está no ar, e o nosso fôlego também, de tanto rir.",
            "Mais uma prova de que o romance vende mais que pão quente.",
            "Enquanto isso, a economia vai bem, obrigado por perguntar.",
            "Jornalismo de ponta: cobrindo o que realmente importa para a humanidade.",
            "A internet agradece por mais este conteúdo vital.",
            "Finalmente, algo relevante para o futuro da nação.",
            "Isso sim é notícia de interesse público comprovado.",
            "O Nobel da Paz que espere, porque aqui tem amor no ar.",
            "Prioridades jornalísticas no seu melhor esplendor.",
            "Enquanto você lia isso, algo importante acontecia em outro lugar.",
            "A imprensa cumprindo seu papel: nos distrair com carinho alheio.",
            "Reportagem investigativa de alto nível: eles se olharam!",
            "Isso muda tudo. Ou nada. Mas muda.",
            "O clima esquenta, e a temperatura do sensacionalismo também.",
            "Plantão urgente: casal existe e continua existindo.",
            "Breaking news: romance persiste apesar dos pesares.",
            "Exclusivo: flagrante de afeto comprova teoria do amor.",
            "Alerta vermelho: demonstração pública de carinho detectada.",
            "Impacto global: gesto romântico abala estruturas da internet.",
            "Histórico: momento fofo entra para os anais do jornalismo.",
            "Urgente: casal continua respirando o mesmo oxigênio.",
            "Revelação bombástica: eles ainda se seguem no Instagram.",
            "Ciência explica: a gravidade ainda mantém o casal unido.",
            "Exclusivo: fontes próximas confirmam que o sol nasceu para ambos.",
            "Marco histórico: mais de 24 horas sem boatos de separação.",
            "Análise técnica: o nível de 'ship' permanece estável na bolsa.",
            "Furo: paparazzi confirmam que eles comem comida, como humanos.",
            "Plantão fofoca: a paz mundial depende deste relacionamento.",
            "Relatório especial: o amor não é apenas uma construção social.",
            "Bomba: eles foram vistos em um lugar, fazendo coisas.",
            "Incrível: o carinho mútuo ainda é legalizado por lei.",
            "Notícia de última hora: o amor é lindo, e o clique é lucro.",
            "Investigação: a química do casal desafia as leis da termodinâmica.",
            "Alerta de fofura: o nível de glicose na internet subiu 20%.",
            "Documentário: a vida segue, e o casal também, aparentemente.",
            "Extra: fontes revelam que eles conversam um com o outro.",
            "Urgente: nada de novo no front, mas o feed precisa rodar.",
            "Sensacional: demonstração de afeto em 4K disponível.",
            "Histórico: o primeiro beijo do dia (provavelmente) já aconteceu.",
            "Basta: o mundo para para ver o casal passear com o cachorro."
        ];

        // Sinônimos e variações para cada pessoa do casal
        const SINONIMOS_CASAIS = {
            "Paolla & Diogo": {
                pessoaA: ["paolla", "paola", "oliveira", "paolla oliveira", "paola oliveira"],
                pessoaB: ["diogo", "nogueira", "diogo nogueira"]
            },
            "Bruna & Shawn Mendes": {
                pessoaA: ["bruna", "marquezine", "bruna marquezine"],
                pessoaB: ["shawn", "mendes", "shawn mendes"]
            }
        };

        // Função para detectar automaticamente o casal baseado na URL/título
        function detectarCasalAutomatico(texto) {
            const textoLower = texto.toLowerCase();
            
            for (const [casal, regras] of Object.entries(SINONIMOS_CASAIS)) {
                const temA = regras.pessoaA.some(t => textoLower.includes(t));
                const temB = regras.pessoaB.some(t => textoLower.includes(t));
                if (temA && temB) {
                    return casal;
                }
            }
            return null;
        }

        // ==========================================
        // EXTRAÇÃO DE METADADOS
        // ==========================================
        async function extrairMetadados(url) {
            let titulo = '';
            let veiculo = extrairDominio(url);

            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, "text/html");
                
                titulo = doc.querySelector('meta[property="og:title"]')?.content || doc.title || '';

                if (titulo.includes('Access Denied') || titulo.includes('Bot Protection') || titulo === '403 Forbidden') {
                    titulo = ''; 
                }

                const siteName = doc.querySelector('meta[property="og:site_name"]')?.content;
                if (siteName && veiculo === 'Desconhecido') {
                    veiculo = siteName;
                }

            } catch (error) {
                console.warn("Proxy bloqueado pelo servidor de origem.", error);
            }

            return { titulo, veiculo };
        }

        function extrairDominio(url) {
            try {
                const hostname = new URL(url).hostname.toLowerCase();
                
                if (hostname.includes('globo.com')) return 'Globo.com';
                if (hostname.includes('uol.com.br')) return 'UOL';
                if (hostname.includes('metropoles.com') || hostname.includes('leodias')) return 'Metrópoles';
                if (hostname.includes('terra.com.br')) return 'Terra';
                if (hostname.includes('ig.com.br')) return 'iG';
                if (hostname.includes('r7.com')) return 'R7';
                
                const partes = hostname.replace('www.', '').split('.');
                return partes[0].charAt(0).toUpperCase() + partes[0].slice(1);
            } catch (e) {
                return 'Desconhecido';
            }
        }

        // ==========================================
        // LÓGICA DE SUBMISSÃO E VALIDAÇÃO
        // ==========================================
        
        document.getElementById('form-materia').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const urlInput = document.getElementById('url-input').value.trim();
            const btnSubmit = document.getElementById('btn-submit');
            const statusMsg = document.getElementById('status-msg');

            // Validação básica de URL
            try {
                const urlObj = new URL(urlInput);
                if (urlObj.pathname === '/' || urlObj.pathname.length < 5) {
                    throw new Error("Parece que colou a página inicial de um site, e não uma matéria específica.");
                }
            } catch (err) {
                exibirErro(statusMsg, "🚨 Link inválido: " + (err.message || "Verifique a URL."));
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span class="animate-pulse">Analisando...</span>';
            statusMsg.classList.remove('hidden');
            statusMsg.className = 'mt-4 text-sm font-medium text-center text-zinc-400';
            statusMsg.innerText = "Enviando para análise automática...";

            statusMsg.innerText = "A preparar para eternizar no acervo JSON...";
            
            try {
                // Envia apenas a URL - o backend faz toda a detecção e geração de frase
                const res = await fetch('api/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                if (res.status === 404) {
                    throw new Error("O servidor de gravação não foi encontrado. Se estiver no GitHub Pages, a gravação manual não está disponível.");
                }

                const contentType = res.headers.get("content-type");
                if (!contentType || !contentType.includes("application/json")) {
                    throw new Error("Resposta inválida do servidor (não é JSON). Verifique se o server.js está rodando.");
                }
                
                const responseData = await res.json();

                if (!res.ok) {
                    throw new Error(responseData.error || "Erro ao salvar");
                }

                statusMsg.innerText = "Obra de arte jornalística catalogada com sucesso!";
                statusMsg.className = 'mt-4 text-sm font-medium text-center text-emerald-400';
                document.getElementById('url-input').value = '';
                carregarDashboard();

            } catch (error) {
                exibirErro(statusMsg, error.message.includes('já está no') ? "Calma lá! Essa pérola já está no nosso acervo." : `Erro: ${error.message}`);
            }

            btnSubmit.disabled = false;
            btnSubmit.innerText = 'Eternizar';
            
            setTimeout(() => statusMsg.classList.add('hidden'), 6000);
        });

        // Função auxiliar para padronizar exibição de erros
        function exibirErro(elemento, mensagem) {
            elemento.innerText = mensagem;
            elemento.className = 'mt-4 text-sm font-medium text-center text-red-400';
            elemento.classList.remove('hidden');
            setTimeout(() => elemento.classList.add('hidden'), 6000);
        }

        // ==========================================
        // ATUALIZAÇÃO DO DASHBOARD
        // ==========================================
        async function carregarDashboard() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();

                atualizarContador(data);
                atualizarContadorTempo(data);
                atualizarGrafico(data);
                atualizarRanking(data);
                atualizarListaAcervo(data);
            } catch (error) {
                console.error("Erro ao buscar dados:", error);
            }
        }

        function atualizarContadorTempo(data) {
            const contadorEl = document.getElementById('contador-tempo');
            
            if (!data || data.length === 0) {
                contadorEl.innerText = 'Nunca houve notícias 😢';
                return;
            }

            // Pega a data da notícia mais recente
            const datasOrdenadas = [...data].sort((a, b) => 
                new Date(b.data_registro) - new Date(a.data_registro)
            );
            const ultimaNoticia = new Date(datasOrdenadas[0].data_registro);
            const agora = new Date();
            const diferencaMs = agora - ultimaNoticia;

            // Calcula tempo em dias, horas, minutos
            const dias = Math.floor(diferencaMs / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencaMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencaMs % (1000 * 60 * 60)) / (1000 * 60));

            let textoTempo = '';
            if (dias > 0) {
                textoTempo = `${dias}d ${horas}h ${minutos}min`;
            } else if (horas > 0) {
                textoTempo = `${horas}h ${minutos}min`;
            } else {
                textoTempo = `${minutos}min`;
            }

            contadorEl.innerText = textoTempo;

            // Atualiza a cada minuto
            setTimeout(() => atualizarContadorTempo(data), 60000);
        }

        function atualizarContador(data) {
            const animar = (obj, inicio, fim, duracao) => {
                let tempoInicio = null;
                const passo = (timestamp) => {
                    if (!tempoInicio) tempoInicio = timestamp;
                    const progresso = Math.min((timestamp - tempoInicio) / duracao, 1);
                    obj.innerHTML = Math.floor(progresso * (fim - inicio) + inicio);
                    if (progresso < 1) window.requestAnimationFrame(passo);
                };
                window.requestAnimationFrame(passo);
            }
            const contadorEl = document.getElementById('contador-total');
            animar(contadorEl, 0, data.length, 1000);
        }

        function atualizarGrafico(data) {
            const contagemPorData = data.reduce((acc, item) => {
                // CORREÇÃO: Pega a data local garantindo o formato YYYY-MM-DD correto
                const d = new Date(item.data_registro);
                const dataFormatada = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                
                acc[dataFormatada] = (acc[dataFormatada] || 0) + 1;
                return acc;
            }, {});

            const labels = Object.keys(contagemPorData);
            const valores = Object.values(contagemPorData);

            const ctx = document.getElementById('grafico-ocio').getContext('2d');
            
            if (graficoInstancia) graficoInstancia.destroy();

            graficoInstancia = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Matérias',
                        data: valores,
                        borderColor: '#ef4444', 
                        backgroundColor: 'rgba(239, 68, 68, 0.05)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#09090b',
                        pointBorderColor: '#ef4444',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                }
            });
        }

        function atualizarRanking(data) {
            const contagemVeiculo = data.reduce((acc, item) => {
                acc[item.veiculo] = (acc[item.veiculo] || 0) + 1;
                return acc;
            }, {});

            const top5 = Object.entries(contagemVeiculo)
                .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
                .slice(0, 5);

            const listaEl = document.getElementById('ranking-lista');
            listaEl.innerHTML = '';

            if (top5.length === 0) {
                listaEl.innerHTML = '<li class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest py-4">Silêncio Absoluto</li>';
                return;
            }

            top5.forEach(([veiculo, qtd]) => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center py-2 group border-b border-white/5 last:border-0";
                li.innerHTML = `
                    <span class="text-[11px] font-bold text-zinc-400 group-hover:text-white transition-colors uppercase tracking-wider">${veiculo}</span>
                    <span class="text-[11px] font-black text-rose-500">${qtd}</span>
                `;
                listaEl.appendChild(li);
            });
        }

        function atualizarListaAcervo(data) {
            const listaEl = document.getElementById('lista-materias');
            listaEl.innerHTML = '';

            if (data.length === 0) {
                listaEl.innerHTML = '<li class="text-zinc-600 text-xs italic py-4 text-center">Ainda aguardando o próximo furo irrelevante.</li>';
                return;
            }

            const recentes = [...data].reverse();

            recentes.forEach((item) => {
                const li = document.createElement('li');
                li.className = "group border-l border-white/5 pl-6 py-2 transition-all hover:border-rose-500 mb-6 last:mb-0";
                
                const dataFormatada = new Date(item.data_registro).toLocaleDateString('pt-BR', {
                    day: '2-digit', month: '2-digit'
                });

                li.innerHTML = `
                    <div class="flex flex-col gap-1">
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] font-black text-zinc-600 uppercase tracking-widest">${item.veiculo}</span>
                            <span class="h-px bg-white/5 w-4"></span>
                            <span class="text-[9px] font-black text-rose-500 uppercase tracking-widest">${item.casal_referenciado}</span>
                            <span class="ml-auto text-[9px] font-bold text-zinc-700 font-mono">${dataFormatada}</span>
                        </div>
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" 
                           class="text-zinc-400 text-sm font-semibold group-hover:text-white transition-colors leading-snug">
                            ${item.titulo}
                        </a>
                    </div>
                `;
                listaEl.appendChild(li);
            });
        }

        // Inicializar
        carregarDashboard();
    </script>
</body>
</html>
