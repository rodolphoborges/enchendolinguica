<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termômetro da Encheção de Linguiça</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        zincbg: '#09090b', /* Zinc 950 */
                        zinccard: '#18181b', /* Zinc 900 */
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #09090b;
            color: #e4e4e7; /* Zinc 200 */
        }
        /* Scrollbar Minimalista */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #27272a; /* Zinc 800 */
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #3f3f46; /* Zinc 700 */
        }
        /* Foco invisível padrão para select */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2371717a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="font-sans min-h-screen p-4 md:p-8 antialiased selection:bg-red-500/30 selection:text-red-200">

    <div class="max-w-5xl mx-auto space-y-10">
        
        <header class="text-center space-y-3 pt-8 pb-4">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-zinc-100">
                Termômetro da <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400">Encheção de Linguiça</span>
            </h1>
            <p class="text-zinc-500 text-sm md:text-base font-medium tracking-wide">
                Monitorando o Índice de Depravação Jornalística e a falta de pauta da imprensa.
            </p>
        </header>

        <section class="bg-zinccard/50 border border-white/5 backdrop-blur-md p-6 rounded-2xl shadow-2xl">
            <form id="form-materia" class="flex flex-col md:flex-row gap-3">
                <input type="url" id="url-input" required placeholder="Cole a URL da matéria aqui..." 
                    class="flex-1 bg-zincbg border border-zinc-800 rounded-xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all text-zinc-200 placeholder-zinc-600 text-sm">
                
                <select id="casal-input" class="bg-zincbg border border-zinc-800 rounded-xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all text-zinc-200 text-sm md:w-64 cursor-pointer">
                    <option value="Paolla & Diogo">Paolla & Diogo</option>
                    <option value="Bruna & Shawn Mendes">Bruna & Shawn Mendes</option>
                </select>

                <button type="submit" id="btn-submit" 
                    class="bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-8 rounded-xl transition-all active:scale-95 shadow-lg shadow-red-500/20 flex items-center justify-center min-w-[140px] text-sm">
                    Catalogar
                </button>
            </form>
            <p id="status-msg" class="mt-4 text-sm text-zinc-400 hidden font-medium text-center"></p>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-zinccard/50 border border-white/5 p-8 rounded-2xl shadow-xl flex flex-col items-center justify-center text-center">
                <h3 class="text-zinc-500 uppercase text-[10px] font-bold tracking-widest mb-4">Total Inútil</h3>
                <span id="contador-total" class="text-7xl font-light tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-zinc-100 to-zinc-500">0</span>
            </div>

            <div class="bg-zinccard/50 border border-white/5 p-6 rounded-2xl shadow-xl md:col-span-2 flex flex-col">
                <h3 class="text-zinc-500 uppercase text-[10px] font-bold tracking-widest mb-4">Desespero por Cliques (Evolução)</h3>
                <div class="flex-1 relative w-full">
                    <canvas id="grafico-ocio"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pb-12">
            
            <section class="bg-zinccard/50 border border-white/5 p-6 rounded-2xl shadow-xl">
                <h3 class="text-zinc-500 uppercase text-[10px] font-bold tracking-widest mb-5 flex items-center gap-2">
                    <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Ranking da Vergonha
                </h3>
                <ul id="ranking-lista" class="space-y-1">
                    </ul>
            </section>

            <section class="bg-zinccard/50 border border-white/5 p-6 rounded-2xl shadow-xl md:col-span-2">
                <h3 class="text-zinc-500 uppercase text-[10px] font-bold tracking-widest mb-5 flex items-center gap-2">
                    <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H14"></path></svg>
                    Acervo de Futilidades
                </h3>
                <ul id="lista-materias" class="space-y-1 max-h-[320px] overflow-y-auto pr-2 custom-scrollbar">
                    </ul>
            </section>
        </div>

    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÕES SUPABASE
        // ==========================================
        const SUPABASE_URL = 'https://tfzutfllymhvbzcwuraj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_TGVGTt1VJqd0AlRURyzW8w_K6uPTQ7x';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let graficoInstancia = null;

        // ==========================================
        // EXTRAÇÃO DE METADADOS
        // ==========================================
        async function extrairMetadados(url) {
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, "text/html");
                
                const titulo = doc.querySelector('meta[property="og:title"]')?.content || doc.title || 'Título não encontrado';
                const veiculo = doc.querySelector('meta[property="og:site_name"]')?.content || extrairDominio(url);

                return { titulo, veiculo };
            } catch (error) {
                console.error("Erro ao extrair metadados:", error);
                return { titulo: 'Falha ao ler título', veiculo: extrairDominio(url) };
            }
        }

        function extrairDominio(url) {
            try {
                return new URL(url).hostname.replace('www.', '');
            } catch (e) {
                return 'Desconhecido';
            }
        }

        // ==========================================
        // LÓGICA DE SUBMISSÃO
        // ==========================================
        document.getElementById('form-materia').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const urlInput = document.getElementById('url-input').value;
            const casalInput = document.getElementById('casal-input').value;
            const btnSubmit = document.getElementById('btn-submit');
            const statusMsg = document.getElementById('status-msg');

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span class="animate-pulse">Extraindo...</span>';
            statusMsg.classList.remove('hidden');
            statusMsg.innerText = "Lendo a fofoca para você não precisar...";

            const { titulo, veiculo } = await extrairMetadados(urlInput);

            statusMsg.innerText = "Salvando no banco de dados...";
            const { data, error } = await supabaseClient
                .from('materias_inuteis')
                .insert([
                    { url: urlInput, casal_referenciado: casalInput, titulo: titulo, veiculo: veiculo }
                ]);

            if (error) {
                statusMsg.innerText = error.code === '23505' ? "Erro: Esta URL já foi catalogada!" : `Erro: ${error.message}`;
                statusMsg.classList.replace('text-zinc-400', 'text-red-400');
            } else {
                statusMsg.innerText = "Matéria catalogada com sucesso!";
                statusMsg.classList.replace('text-zinc-400', 'text-emerald-400');
                document.getElementById('url-input').value = '';
                carregarDashboard();
            }

            btnSubmit.disabled = false;
            btnSubmit.innerText = 'Catalogar';
            
            setTimeout(() => {
                statusMsg.classList.add('hidden');
                statusMsg.classList.replace('text-red-400', 'text-zinc-400');
                statusMsg.classList.replace('text-emerald-400', 'text-zinc-400');
            }, 5000);
        });

        // ==========================================
        // ATUALIZAÇÃO DO DASHBOARD
        // ==========================================
        async function carregarDashboard() {
            const { data, error } = await supabaseClient
                .from('materias_inuteis')
                .select('*')
                .order('data_registro', { ascending: true });

            if (error || !data) {
                console.error("Erro ao buscar dados:", error);
                return;
            }

            atualizarContador(data);
            atualizarGrafico(data);
            atualizarRanking(data);
            atualizarListaAcervo(data);
        }

        function atualizarContador(data) {
            const animar = (obj, inicio, fim, duracao) => {
                let tempoInicio = null;
                const passo = (timestamp) => {
                    if (!tempoInicio) tempoInicio = timestamp;
                    const progresso = Math.min((timestamp - tempoInicio) / duracao, 1);
                    obj.innerHTML = Math.floor(progresso * (fim - inicio) + inicio);
                    if (progresso < 1) window.requestAnimationFrame(passo);
                };
                window.requestAnimationFrame(passo);
            }
            const contadorEl = document.getElementById('contador-total');
            animar(contadorEl, 0, data.length, 1000);
        }

        function atualizarGrafico(data) {
            const contagemPorData = data.reduce((acc, item) => {
                const dataFormatada = new Date(item.data_registro).toISOString().split('T')[0];
                acc[dataFormatada] = (acc[dataFormatada] || 0) + 1;
                return acc;
            }, {});

            const labels = Object.keys(contagemPorData);
            const valores = Object.values(contagemPorData);

            const ctx = document.getElementById('grafico-ocio').getContext('2d');
            
            if (graficoInstancia) graficoInstancia.destroy();

            graficoInstancia = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Matérias',
                        data: valores,
                        borderColor: '#ef4444', // red-500
                        backgroundColor: 'rgba(239, 68, 68, 0.05)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#09090b',
                        pointBorderColor: '#ef4444',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            ticks: { color: '#52525b', stepSize: 1, font: { family: 'Inter' } }, // zinc-600
                            grid: { color: '#27272a', borderDash: [5, 5] }, // zinc-800
                            border: { display: false }
                        },
                        x: { 
                            ticks: { color: '#52525b', font: { family: 'Inter' } },
                            grid: { display: false },
                            border: { display: false }
                        }
                    },
                    interaction: { mode: 'nearest', axis: 'x', intersect: false }
                }
            });
        }

        function atualizarRanking(data) {
            const contagemVeiculo = data.reduce((acc, item) => {
                acc[item.veiculo] = (acc[item.veiculo] || 0) + 1;
                return acc;
            }, {});

            const top5 = Object.entries(contagemVeiculo)
                .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
                .slice(0, 5);

            const listaEl = document.getElementById('ranking-lista');
            listaEl.innerHTML = '';

            if (top5.length === 0) {
                listaEl.innerHTML = '<li class="text-zinc-600 text-sm italic py-4">Sem dados no momento.</li>';
                return;
            }

            let rankPosicao = 0;
            let qtdAnterior = null;

            top5.forEach(([veiculo, qtd], index) => {
                if (qtd !== qtdAnterior) {
                    rankPosicao = index;
                    qtdAnterior = qtd;
                }

                // Cores minimalistas para o pódio
                const coresPodio = ['text-amber-400', 'text-zinc-300', 'text-orange-400'];
                const corPosicao = rankPosicao < 3 ? coresPodio[rankPosicao] : 'text-zinc-600';
                const numDisplay = (rankPosicao + 1).toString().padStart(2, '0');

                const li = document.createElement('li');
                li.className = "flex justify-between items-center py-3 border-b border-white/5 last:border-0 hover:bg-white/[0.02] px-2 rounded-lg transition-colors";
                li.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-bold ${corPosicao} font-mono">${numDisplay}</span>
                        <span class="font-medium text-zinc-200 text-sm">${veiculo}</span>
                    </div>
                    <span class="text-zinc-500 text-xs font-semibold">${qtd}</span>
                `;
                listaEl.appendChild(li);
            });
        }

        function atualizarListaAcervo(data) {
            const listaEl = document.getElementById('lista-materias');
            listaEl.innerHTML = '';

            if (data.length === 0) {
                listaEl.innerHTML = '<li class="text-zinc-600 text-sm italic py-4">O acervo está vazio.</li>';
                return;
            }

            const recentes = [...data].reverse();

            recentes.forEach((item) => {
                const li = document.createElement('li');
                li.className = "group flex flex-col p-3 rounded-xl hover:bg-white/[0.03] border border-transparent hover:border-white/5 transition-all gap-2";
                
                const dataFormatada = new Date(item.data_registro).toLocaleDateString('pt-BR', {
                    day: '2-digit', month: '2-digit'
                });

                li.innerHTML = `
                    <a href="${item.url}" target="_blank" rel="noopener noreferrer" 
                       class="text-zinc-300 text-sm font-medium group-hover:text-red-400 transition-colors truncate block w-full" 
                       title="${item.titulo}">
                        ${item.titulo}
                    </a>
                    <div class="flex justify-between items-center text-[11px] text-zinc-500 font-medium">
                        <span class="truncate max-w-[120px]">${item.veiculo}</span>
                        <div class="flex gap-2 items-center">
                            <span class="bg-zinc-800/50 px-2 py-0.5 rounded-full text-zinc-400">${item.casal_referenciado}</span>
                            <span>${dataFormatada}</span>
                        </div>
                    </div>
                `;
                listaEl.appendChild(li);
            });
        }

        // Inicializar
        carregarDashboard();
    </script>
</body>
</html>
