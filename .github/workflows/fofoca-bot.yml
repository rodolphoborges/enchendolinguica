name: Robô da Fofoca Automático

on:
  schedule:
    # Corre a cada 4 horas
    - cron: '0 */4 * * *'
  workflow_dispatch: # Permite correr o script manualmente

permissions:
  contents: write

jobs:
  garimpar_noticias:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependências
      run: npm install

    - name: Executar o Scraper
      run: node scraper.js

    - name: Configurar o Usuário do Git
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Commit e Push das novas fofocas no data.json
      run: |
        git add data.json
        if git diff --cached --exit-code; then
          echo "Nenhuma fofoca nova hoje :("
        else
          git commit -m "🤖 Pérolas de futilidade eternizadas no acervo [GHA]"
          git push
        fi
